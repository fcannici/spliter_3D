name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "app/**"
      - "main.py"
      - "packaging/**"
      - "scripts/build_*"
      - "requirements*.txt"
      - ".github/workflows/build.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: split3r-linux
          - os: windows-latest
            artifact: split3r-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxrender1 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt -r requirements-dev.txt

      - name: Validate
        run: |
          python -m compileall -q main.py app scripts tests
          python -m pytest -q

      - name: Build
        run: pyinstaller packaging/split3r.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Split3rClone
